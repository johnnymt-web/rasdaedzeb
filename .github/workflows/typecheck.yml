name: Typecheck

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run TypeScript typecheck
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log
          status=${PIPESTATUS[0]}
          {
            echo "### TypeScript typecheck result"
            if [ "$status" -eq 0 ]; then
              echo "✅ No type errors."
            else
              echo "❌ Type errors found:"
              echo '```'
              cat typecheck.log
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit $status
